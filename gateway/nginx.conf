events { worker_connections 1024; }

http {
    server {
        listen 80;
        server_name localhost;
        resolver 127.0.0.11 valid=2s;

        # Route interne pour la validation des Tokens (non accessible depuis l'extérieur)
        location = /_auth_verify {
            internal;
            proxy_pass http://user-service:8080/api/user/auth/validate;
            proxy_pass_request_body off; # Pas besoin d'envoyer le body pour valider un token
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header Authorization $http_authorization; # Transmet le JWT
        }

        # Frontend Service (Root) - Pas besoin de protection ici (Public)
        location / {
            proxy_pass http://frontend-service:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # User Service - Public pour login/register
        location /api/user/ {
            proxy_pass http://user-service:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Booking Service - SÉCURISÉ PAR NGINX
        location /api/booking/ {
            auth_request /_auth_verify; # <--- Demande validation au user-service avant de passer
            
            proxy_pass http://booking-service:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Catalog Service - SÉCURISÉ PAR NGINX
        location /api/catalog/ {
            auth_request /_auth_verify; # <--- Demande validation au user-service avant de passer
            
            proxy_pass http://catalog-service:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Notification Service
        location /api/notification/ {
            auth_request /_auth_verify;
            proxy_pass http://notification-service:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ... (Prometheus & Grafana restent inchangés)
    }
}