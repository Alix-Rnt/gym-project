openapi: 3.0.3
info:
  title: Notification Service
  description: Gestion des notifications et des templates
  version: 0.1.0

servers:
  - url: http://localhost:8084
    description: Serveur local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    NotificationType:
      type: string
      enum:
        - REMINDER
        - CANCELLATION
        - WAITLIST_AVAILABLE
        - SUBSCRIPTION_EXPIRY
        - MANUAL

paths:
  /templates:
    get:
      summary: Lister les templates 
      tags:
        - Templates
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des templates
        '401':
          description: Non authentifié
        '403':
          description: Non autorisé
    post:
      summary: Créer un template 
      tags:
        - Templates
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - subject
                - content
              properties:
                name:
                  type: string
                subject:
                  type: string
                content:
                  type: string
      responses:
        '201':
          description: Template créé
        '400':
          description: Données invalides
        '401':
          description: Non authentifié
        '403':
          description: Non autorisé

  /templates/{id}:
    get:
      summary: Récupérer un template 
      tags:
        - Templates
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Template trouvé
        '401':
          description: Non authentifié
        '403':
          description: Non autorisé
        '404':
          description: Template introuvable
    put:
      summary: Modifier un template 
      tags:
        - Templates
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                subject:
                  type: string
                content:
                  type: string
      responses:
        '200':
          description: Template modifié
        '400':
          description: Données invalides
        '401':
          description: Non authentifié
        '403':
          description: Non autorisé
        '404':
          description: Template introuvable
    delete:
      summary: Supprimer un template 
      tags:
        - Templates
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Template supprimé
        '401':
          description: Non authentifié
        '403':
          description: Non autorisé
        '404':
          description: Template introuvable

  /notifications:
    get:
      summary: Historique des notifications
      tags:
        - Notifications
      security:
        - bearerAuth: []
      parameters:
        - name: memberId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filtrer par membre (admin ou membre lui-même)
      responses:
        '200':
          description: Historique des notifications
        '401':
          description: Non authentifié
        '403':
          description: Non autorisé
    post:
      summary: Envoyer une notification manuelle 
      tags:
        - Notifications
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - memberIds
                - templateId
              properties:
                type:
                  $ref: '#/components/schemas/NotificationType'
                subject:
                  type: string
                  description: Optionnel, écrase le sujet du template
                content:
                  type: string
                  description: Optionnel, écrase le contenu du template
                memberIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                templateId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Notification envoyée
        '400':
          description: Données invalides
        '401':
          description: Non authentifié
        '403':
          description: Non autorisé
        '404':
          description: Template introuvable