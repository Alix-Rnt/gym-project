<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gym Fit - Inscription</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .register-container { background: #222; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #2ecc71; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #444; background: #333; color: white; border-radius: 4px; box-sizing: border-box; }
        
        .role-selector { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .radio-label { background: #333; padding: 10px 20px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .role-selector input[type="radio"] { display: none; }
        .role-selector input[type="radio"]:checked + .radio-label { border-color: #2ecc71; background: #1e7e43; }
        
        .btn-submit { width: 100%; padding: 12px; background: #2ecc71; border: none; color: white; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .error-message { color: #e74c3c; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Créer un compte</h2>
    
    <form th:action="@{/auth/register}" method="POST">
        <div class="form-group">
            <label>Prénom</label>
            <input type="text" name="name" required placeholder="John">
        </div>
        <div class="form-group">
            <label>Nom</label>
            <input type="text" name="surname" required placeholder="Doe">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required placeholder="john.doe@example.com">
        </div>
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" required placeholder="johndoe99">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="password" required placeholder="********">
        </div>

        <div class="role-selector">
            <label>
                <input type="radio" name="role" value="MEMBER" checked>
                <span class="radio-label">Membre</span>
            </label>
            <label>
                <input type="radio" name="role" value="COACH">
                <span class="radio-label">Coach</span>
            </label>
        </div>

        <button type="submit" class="btn-submit">S'inscrire</button>
        
        <div th:if="${error}" class="error-message" th:text="${error}"></div>
    </form>
    <a th:href="@{/}" class="btn-cancel">Retour à la page d'accueil</a>
</div>

</body>
</html>
