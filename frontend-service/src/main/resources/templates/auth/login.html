<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gym Fit - Connexion</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-container { background: #222; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #2ecc71; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #444; background: #333; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: #2ecc71; border: none; color: black; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .error-message { color: #e74c3c; margin-top: 15px; text-align: center; }
        .switch-link { text-align: center; margin-top: 15px; display: block; color: #aaa; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Connexion</h2>
    
    <form th:action="@{/auth/login}" method="POST">
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" required placeholder="Votre username">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="password" required placeholder="********">
        </div>

        <button type="submit" class="btn-submit">Se connecter</button>
        
        <div th:if="${error}" class="error-message" th:text="${error}"></div>
    </form>
    
    <a th:href="@{/auth/register}" class="switch-link">Pas encore de compte ? S'inscrire</a>
</div>

</body>
</html>
