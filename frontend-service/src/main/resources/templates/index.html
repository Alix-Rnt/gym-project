<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gym Fit - Bienvenue</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #111;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .welcome-container {
            background: #222;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #2ecc71;
            font-size: 3rem;
            margin-bottom: 10px;
        }
        p {
            color: #aaa;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }
        .actions {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .btn {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-login {
            background: #2ecc71;
            color: white;
        }
        .btn-login:hover {
            background: #27ae60;
        }
        .btn-register {
            background: transparent;
            color: #2ecc71;
            border: 2px solid #2ecc71;
        }
        .btn-register:hover {
            background: #2ecc71;
            color: black;
        }
    </style>
</head>
<body>

<div class="welcome-container">
    <h1>GYM FIT</h1>
    <p>Prenez le contrôle de vos entraînements et gérez vos plannings en quelques clics.</p>
    
    <div class="actions">
        <a th:href="@{/auth/login}" class="btn btn-login">Connexion</a>
        <a th:href="@{/auth/register}" class="btn btn-register">Inscription</a>
    </div>
</div>

</body>
</html>
