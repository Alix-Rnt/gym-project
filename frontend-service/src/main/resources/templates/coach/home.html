<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Espace Coach - Gym Fit</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: white; margin: 0; }
        .container { padding: 30px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 20px; }
        .card { background: #222; padding: 20px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; }
        h3 { color: #2ecc71; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; color: #aaa; margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 8px; background: #333; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn { background: #2ecc71; color: black; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; }
        ul { padding-left: 20px; margin: 0; color: #ccc; }
        li { margin-bottom: 8px; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h2>Espace Entraîneur / Coach</h2>
    
    <div class="grid">
        <div>
            <div class="card">
                <h3>Mon Profil Coach</h3>
                <p><strong>Nom :</strong> <span th:text="${coach.surname}"></span></p>
                <p><strong>Prénom :</strong> <span th:text="${coach.name}"></span></p>
                <p><strong>Email :</strong> <span th:text="${coach.email}"></span></p>
            </div>
            
            <div class="card">
                <h3>Mes Cours au Catalogue</h3>
                <div th:if="${#lists.isEmpty(myLessons)}">Aucun cours créé pour le moment.</div>
                <ul>
                    <li th:each="lesson : ${myLessons}">
                        <strong th:text="${lesson.name}"></strong> - <span th:text="${lesson.duration}"></span> min
                    </li>
                </ul>
            </div>
        </div>

        <div>
            <div class="card">
                <h3>Créer un type de Cours (Catalog)</h3>
                <form th:action="@{/coach/lesson}" method="POST">
                    <div class="form-group">
                        <label>Nom du cours</label>
                        <input type="text" name="name" required placeholder="ex: Crossfit Avancé">
                    </div>
                    <div class="form-group">
                        <label>Durée (en minutes)</label>
                        <input type="number" name="duration" required placeholder="60">
                    </div>
                    <button type="submit" class="btn">Enregistrer le Cours</button>
                </form>
            </div>
            
            <div class="card">
                <h3>Créer une Offre d'Abonnement (Booking)</h3>
                <form th:action="@{/coach/subscription}" method="POST">
                    <div class="form-group">
                        <label>Nom de l'offre d'abonnement</label>
                        <input type="text" name="name" required placeholder="ex: Pass Mensuel Full Access">
                    </div>
                    <div class="form-group">
                        <label>Prix (€)</label>
                        <input type="number" name="price" required placeholder="49">
                    </div>
                    <div class="form-group">
                        <label>Capacité maximale</label>
                        <input type="number" name="capacity" required placeholder="30">
                    </div>
                    <button type="submit" class="btn">Publier l'abonnement</button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
