<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Espace Membre - Gym Fit</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: white; margin: 0; }
        .container { padding: 30px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 20px; }
        .card { background: #222; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        h3 { color: #2ecc71; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .btn-action { background: #2ecc71; color: black; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-danger { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h2>Tableau de bord Membre</h2>
    
    <div class="grid">
        <div class="card">
            <h3>Mon Profil</h3>
            <p><strong>Nom :</strong> <span th:text="${member.surname}"></span></p>
            <p><strong>Prénom :</strong> <span th:text="${member.name}"></span></p>
            <p><strong>Email :</strong> <span th:text="${member.email}"></span></p>
            <hr style="border-color:#333;">
            
            <form th:action="@{/member/delete}" method="POST">
                <button type="submit" class="btn-action btn-danger" onclick="return confirm('Confirmer la suppression définitive ?')">Supprimer mon compte</button>
            </form>
        </div>

        <div class="card">
            <h3>Mes Abonnements Actifs</h3>
            <div th:if="${#lists.isEmpty(mySubscriptions)}">Aucun abonnement actif.</div>
            <div th:each="sub : ${mySubscriptions}">
                <p>✅ <strong th:text="${sub.name}"></strong> - <span th:text="${sub.price}"></span>€</p>
            </div>
        </div>
    </div>

    <div class="card" style="margin-top: 30px;">
        <h3>Rechercher et s'inscrire à un abonnement</h3>
        <div th:each="sub : ${catalogSubscriptions}" style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <span><strong th:text="${sub.name}"></strong> - <span th:text="${sub.price}"></span>€ (Capacité: <span th:text="${sub.capacity}"></span>)</span>
            
            <form th:action="@{/member/subscribe}" method="POST" style="margin:0;">
                <input type="hidden" name="subscriptionId" th:value="${sub.id}"/>
                <button type="submit" class="btn-action">S'inscrire</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
